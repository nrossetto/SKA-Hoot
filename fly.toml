# fly.toml - SKA-HOOT sem PostgreSQL integrado (vamos usar Neon.tech)

app = "ska-hoot-nicolas"

primary_region = "gru"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256