<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA-HOOT - Controle do Jogo</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .game-control-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .controle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .codigo-sala {
            font-size: 2em;
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
        .botoes-controle {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .botoes-controle button {
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .botoes-controle button:hover { transform: scale(1.02); }
        .btn-iniciar { background: #27ae60; color: white; }
        .btn-proxima { background: #3498db; color: white; }
        .btn-pausar { background: #f39c12; color: white; }
        .btn-retomar { background: #2ecc71; color: white; }
        .btn-sair { background: #e74c3c; color: white; }
        
        .espelho-jogo {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .pergunta-texto {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            color: #2c3e50;
            text-align: center;
        }
        .opcoes-espelho {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .opcao-espelho {
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .opcao-a { background: #e74c3c; color: white; }
        .opcao-b { background: #2ecc71; color: white; }
        .opcao-c { background: #3498db; color: white; }
        .opcao-d { background: #f1c40f; color: #2c3e50; }
        
        .timer-espelho {
            width: 100%;
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            width: 100%;
            background: #f1c40f;
            transition: width 0.1s linear;
        }
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .jogadores-panel, .ranking-panel {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .jogador-item, .ranking-item {
            padding: 8px;
            border-bottom: 1px solid #555;
            display: flex;
            justify-content: space-between;
        }
        .sem-jogo {
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
        }
        .status-pausado {
            background: #f39c12;
            color: #2c3e50;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
        .imagem-espelho {
            max-width: 300px;
            max-height: 200px;
            border-radius: 10px;
            margin: 10px auto;
            display: block;
        }
        @media (max-width: 768px) {
            .info-panel { grid-template-columns: 1fr; }
            .opcoes-espelho { grid-template-columns: 1fr; }
            .pergunta-texto { font-size: 1.2em; }
        }
    </style>
</head>
<body class="host-body">
    <div class="game-control-container">
        <div class="controle-header">
            <h1>🎮 SKA-HOOT - Controle do Jogo</h1>
            <div id="codigoDisplay" class="codigo-sala">---</div>
        </div>
        
        <div class="botoes-controle">
            <button id="btnIniciar" class="btn-iniciar" onclick="iniciarJogo()" disabled>▶ INICIAR JOGO</button>
            <button id="btnProxima" class="btn-proxima" onclick="proximaPergunta()" disabled>⏭ PRÓXIMA</button>
            <button onclick="sair()" class="btn-sair">🚪 SAIR</button>
        </div>
        
        <div id="espelhoJogo" class="espelho-jogo">
            <div class="sem-jogo">
                <h2>🎯 Nenhum jogo ativo</h2>
                <p>1. Crie uma sala no painel principal</p>
                <p>2. Aguarde os jogadores entrarem</p>
                <p>3. Clique em "INICIAR JOGO"</p>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="jogadores-panel">
                <h3>👥 Jogadores (<span id="totalJogadores">0</span>)</h3>
                <div id="listaJogadores"></div>
            </div>
            <div class="ranking-panel">
                <h3>🏆 Ranking</h3>
                <div id="rankingLista"></div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let codigoSala;
        
        const urlParams = new URLSearchParams(window.location.search);
        codigoSala = urlParams.get('codigo');
        
        if (!codigoSala) {
            alert('❌ Código da sala não informado!');
            window.location.href = '/host';
        }
        
        function conectar() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('✅ Conectado');
                socket.emit('host-conectar', codigoSala);
            });
            
            socket.on('host-entrada-aceita', () => {
                document.getElementById('codigoDisplay').innerHTML = `📱 CÓDIGO: ${codigoSala}`;
                document.getElementById('btnIniciar').disabled = false;
            });
            
            socket.on('nova-pergunta-host', (data) => {
                const espelho = document.getElementById('espelhoJogo');
                let imgHtml = data.pergunta.imagem_url ? `<img src="${data.pergunta.imagem_url}" class="imagem-espelho">` : '';
                espelho.innerHTML = `
                    <div>
                        ${imgHtml}
                        <div class="pergunta-texto">${data.pergunta.texto}</div>
                        <div class="timer-espelho"><div class="timer-bar" id="timerBarra"></div></div>
                        <div class="opcoes-espelho">
                            <div class="opcao-espelho opcao-a">🔴 A - ${data.pergunta.opcoes.A}</div>
                            <div class="opcao-espelho opcao-b">🟢 B - ${data.pergunta.opcoes.B}</div>
                            <div class="opcao-espelho opcao-c">🔵 C - ${data.pergunta.opcoes.C}</div>
                            <div class="opcao-espelho opcao-d">🟡 D - ${data.pergunta.opcoes.D}</div>
                        </div>
                    </div>
                `;
                document.getElementById('btnProxima').disabled = false;
                
                // Timer
                let tempo = data.pergunta.tempo;
                const barra = document.getElementById('timerBarra');
                const timer = setInterval(() => {
                    tempo--;
                    if (barra) barra.style.width = `${(tempo / data.pergunta.tempo) * 100}%`;
                    if (tempo <= 0) clearInterval(timer);
                }, 1000);
            });
            
            socket.on('atualizar-jogadores', (jogadores) => {
                const lista = document.getElementById('listaJogadores');
                document.getElementById('totalJogadores').innerText = jogadores.length;
                lista.innerHTML = jogadores.map(j => `<div class="jogador-item">${j.emoji} ${j.nome} - ${j.pontuacao} pts</div>`).join('');
            });
            
            socket.on('atualizar-ranking', (ranking) => {
                const lista = document.getElementById('rankingLista');
                lista.innerHTML = ranking.map(r => `<div class="ranking-item">${r.posicao}º ${r.emoji} ${r.nome} - ${r.pontuacao} pts</div>`).join('');
            });
            
            socket.on('fim-jogo', (data) => {
                alert(`🏆 FIM DE JOGO! Vencedor: ${data.ranking[0]?.nome}`);
                document.getElementById('btnIniciar').disabled = false;
                document.getElementById('btnProxima').disabled = true;
            });
        }
        
        function iniciarJogo() {
            if (confirm('Iniciar o jogo?')) {
                socket.emit('iniciar-jogo', codigoSala);
                document.getElementById('btnIniciar').disabled = true;
            }
        }
        
        function proximaPergunta() {
            socket.emit('proxima-pergunta', codigoSala);
            document.getElementById('btnProxima').disabled = true;
        }
        
        function sair() {
            window.location.href = '/host';
        }
        
        conectar();
    </script>
</body>
</html>
