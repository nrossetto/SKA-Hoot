<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA-HOOT - Controle do Jogo</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .game-control-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .controle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .codigo-sala {
            font-size: 2em;
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
        .botoes-controle {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .botoes-controle button {
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .botoes-controle button:hover {
            transform: scale(1.02);
        }
        .btn-iniciar { background: #27ae60; color: white; }
        .btn-proxima { background: #3498db; color: white; }
        .btn-pausar { background: #f39c12; color: white; }
        .btn-retomar { background: #2ecc71; color: white; }
        .btn-sair { background: #e74c3c; color: white; }
        
        .espelho-jogo {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .pergunta-espelho {
            text-align: center;
        }
        .pergunta-texto {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            color: #2c3e50;
        }
        .opcoes-espelho {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .opcao-espelho {
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: left;
        }
        .opcao-a { background: #e74c3c; color: white; }
        .opcao-b { background: #2ecc71; color: white; }
        .opcao-c { background: #3498db; color: white; }
        .opcao-d { background: #f1c40f; color: #2c3e50; }
        
        .timer-espelho {
            width: 100%;
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            width: 100%;
            background: #f1c40f;
            transition: width 0.1s linear;
        }
        .tempo-restante-texto {
            font-size: 1.2em;
            margin-top: 10px;
            color: #7f8c8d;
        }
        
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .jogadores-panel, .ranking-panel {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .jogadores-panel h3, .ranking-panel h3 {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #555;
        }
        .jogador-item {
            padding: 8px;
            border-bottom: 1px solid #555;
        }
        .ranking-item {
            padding: 8px;
            border-bottom: 1px solid #555;
            display: flex;
            justify-content: space-between;
        }
        .sem-jogo {
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
        }
        .sem-jogo h2 {
            margin-bottom: 20px;
        }
        .status-pausado {
            background: #f39c12;
            color: #2c3e50;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
        .imagem-espelho {
            max-width: 300px;
            max-height: 200px;
            border-radius: 10px;
            margin: 10px auto;
        }
        
        @media (max-width: 768px) {
            .info-panel {
                grid-template-columns: 1fr;
            }
            .opcoes-espelho {
                grid-template-columns: 1fr;
            }
            .pergunta-texto {
                font-size: 1.2em;
            }
            .botoes-controle button {
                padding: 10px 15px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body class="host-body">
    <div class="game-control-container">
        <div class="controle-header">
            <h1>🎮 SKA-HOOT - Controle do Jogo</h1>
            <div id="codigoDisplay" class="codigo-sala">---</div>
        </div>
        
        <div class="botoes-controle">
            <button id="btnIniciar" class="btn-iniciar" onclick="iniciarJogo()" disabled>▶ INICIAR JOGO</button>
            <button id="btnProxima" class="btn-proxima" onclick="proximaPergunta()" disabled>⏭ PRÓXIMA PERGUNTA</button>
            <button id="btnPausar" class="btn-pausar" onclick="pausarJogo()" disabled>⏸ PAUSAR</button>
            <button id="btnRetomar" class="btn-retomar" onclick="retomarJogo()" disabled>▶ RETOMAR</button>
            <button onclick="sair()" class="btn-sair">🚪 SAIR DA SALA</button>
        </div>
        
        <div id="statusPausado" class="status-pausado" style="display:none;">
            ⏸ JOGO PAUSADO ⏸
        </div>
        
        <div id="espelhoJogo" class="espelho-jogo">
            <div class="sem-jogo">
                <h2>🎯 Nenhum jogo ativo</h2>
                <p>1. Crie uma sala no painel principal</p>
                <p>2. Aguarde os jogadores entrarem</p>
                <p>3. Clique em "INICIAR JOGO"</p>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="jogadores-panel">
                <h3>👥 Jogadores na sala (<span id="totalJogadores">0</span>)</h3>
                <div id="listaJogadores"></div>
            </div>
            <div class="ranking-panel">
                <h3>🏆 Ranking</h3>
                <div id="rankingLista"></div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let codigoSala;
        let timerInterval;
        let tempoAtual = 0;
        let pausado = false;
        
        // Pegar código da URL
        const urlParams = new URLSearchParams(window.location.search);
        codigoSala = urlParams.get('codigo');
        
        if (!codigoSala) {
            alert('❌ Código da sala não informado!\n\nVolte ao painel principal e crie uma sala primeiro.');
            window.location.href = '/host';
        }
        
        function conectar() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('✅ Conectado ao servidor');
                socket.emit('host-conectar', codigoSala);
            });
            
            socket.on('host-entrada-aceita', (data) => {
                document.getElementById('codigoDisplay').innerHTML = `📱 CÓDIGO: ${codigoSala}`;
                document.getElementById('btnIniciar').disabled = false;
                console.log('✅ Conectado à sala', codigoSala);
            });
            
            socket.on('nova-pergunta-host', (data) => {
                mostrarPerguntaNoEspelho(data.pergunta);
            });
            
            socket.on('atualizar-jogadores', (jogadores) => {
                const lista = document.getElementById('listaJogadores');
                document.getElementById('totalJogadores').innerText = jogadores.length;
                if (jogadores.length === 0) {
                    lista.innerHTML = '<div class="jogador-item">Nenhum jogador na sala</div>';
                } else {
                    lista.innerHTML = jogadores.map(j => `
                        <div class="jogador-item">${j.emoji} ${j.nome} - ${j.pontuacao} pts</div>
                    `).join('');
                }
            });
            
            socket.on('atualizar-ranking', (ranking) => {
                const lista = document.getElementById('rankingLista');
                if (ranking.length === 0) {
                    lista.innerHTML = '<div class="ranking-item">Aguardando respostas...</div>';
                } else {
                    lista.innerHTML = ranking.slice(0, 10).map(r => `
                        <div class="ranking-item">
                            <span>${r.posicao}º ${r.emoji} ${r.nome}</span>
                            <strong>${r.pontuacao} pts</strong>
                        </div>
                    `).join('');
                }
            });
            
            socket.on('fim-jogo', (data) => {
                const ranking = data.ranking;
                const vencedor = ranking[0];
                
                document.getElementById('espelhoJogo').innerHTML = `
                    <div class="sem-jogo">
                        <h2>🎉 FIM DE JOGO! 🎉</h2>
                        <div style="font-size: 2em; margin: 20px;">🏆</div>
                        <h3>Campeão: ${vencedor?.nome || '-'}</h3>
                        <p>${vencedor?.pontuacao || 0} pontos</p>
                        <hr>
                        <h4>Top 3</h4>
                        ${ranking.slice(0, 3).map((r, i) => `<p>${i+1}º ${r.emoji} ${r.nome} - ${r.pontuacao} pts</p>`).join('')}
                        <button onclick="location.reload()" class="btn-principal" style="margin-top: 20px;">🔁 CRIAR NOVA SALA</button>
                    </div>
                `;
                document.getElementById('btnIniciar').disabled = true;
                document.getElementById('btnProxima').disabled = true;
                document.getElementById('btnPausar').disabled = true;
                document.getElementById('btnRetomar').disabled = true;
                if (timerInterval) clearInterval(timerInterval);
            });
            
            socket.on('jogo-pausado', () => {
                pausado = true;
                document.getElementById('statusPausado').style.display = 'block';
                if (timerInterval) clearInterval(timerInterval);
            });
            
            socket.on('jogo-retomado', () => {
                pausado = false;
                document.getElementById('statusPausado').style.display = 'none';
                if (tempoAtual > 0) {
                    iniciarTimer(tempoAtual);
                }
            });
            
            socket.on('erro', (msg) => {
                alert('Erro: ' + msg);
            });
        }
        
        function mostrarPerguntaNoEspelho(pergunta) {
            const espelho = document.getElementById('espelhoJogo');
            
            let imagemHtml = '';
            if (pergunta.imagem_base64) {
                imagemHtml = `<img src="${pergunta.imagem_base64}" class="imagem-espelho">`;
            }
            
            espelho.innerHTML = `
                <div class="pergunta-espelho">
                    ${imagemHtml}
                    <div class="pergunta-texto">${escapeHtml(pergunta.texto)}</div>
                    <div class="timer-espelho">
                        <div class="timer-bar" id="timerBarra"></div>
                    </div>
                    <div class="tempo-restante-texto">
                        ⏱ Tempo restante: <span id="tempoDisplay">${pergunta.tempo}</span> segundos
                    </div>
                    <div class="opcoes-espelho">
                        <div class="opcao-espelho opcao-a">🔴 ★ ${escapeHtml(pergunta.opcoes.A)}</div>
                        <div class="opcao-espelho opcao-b">🟢 ▲ ${escapeHtml(pergunta.opcoes.B)}</div>
                        <div class="opcao-espelho opcao-c">🔵 ● ${escapeHtml(pergunta.opcoes.C)}</div>
                        <div class="opcao-espelho opcao-d">🟡 ■ ${escapeHtml(pergunta.opcoes.D)}</div>
                    </div>
                </div>
            `;
            
            iniciarTimer(pergunta.tempo);
            document.getElementById('btnProxima').disabled = false;
            document.getElementById('btnPausar').disabled = false;
        }
        
        function iniciarTimer(tempoTotal) {
            tempoAtual = tempoTotal;
            if (timerInterval) clearInterval(timerInterval);
            
            const barra = document.getElementById('timerBarra');
            const display = document.getElementById('tempoDisplay');
            if (barra) barra.style.width = '100%';
            
            timerInterval = setInterval(() => {
                if (!pausado && tempoAtual > 0) {
                    tempoAtual--;
                    const percentual = (tempoAtual / tempoTotal) * 100;
                    if (barra) barra.style.width = `${percentual}%`;
                    if (display) display.innerText = tempoAtual;
                    
                    if (tempoAtual <= 0) {
                        clearInterval(timerInterval);
                    }
                }
            }, 1000);
        }
        
        function iniciarJogo() {
            if (confirm('▶ Iniciar o jogo agora?\n\nOs jogadores serão notificados e a primeira pergunta aparecerá.')) {
                socket.emit('iniciar-jogo', codigoSala);
                document.getElementById('btnIniciar').disabled = true;
            }
        }
        
        function proximaPergunta() {
            socket.emit('proxima-pergunta', codigoSala);
            document.getElementById('btnProxima').disabled = true;
        }
        
        function pausarJogo() {
            if (confirm('⏸ Pausar o jogo?\n\nOs jogadores não poderão responder até você retomar.')) {
                socket.emit('pausar-jogo', codigoSala);
                document.getElementById('btnPausar').disabled = true;
                document.getElementById('btnRetomar').disabled = false;
            }
        }
        
        function retomarJogo() {
            socket.emit('retomar-jogo', codigoSala);
            document.getElementById('btnPausar').disabled = false;
            document.getElementById('btnRetomar').disabled = true;
        }
        
        function sair() {
            if (confirm('🚪 Sair da sala de controle?\n\nO jogo continuará rodando, mas você perderá o controle.')) {
                window.location.href = '/host';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Conectar quando a página carregar
        conectar();
    </script>
</body>
</html>
